<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTDB Admin Dashboard</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for a cleaner dashboard look */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <!-- Header -->
  <header class="bg-indigo-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="bg-white p-2 rounded-lg">
           <svg class="w-6 h-6 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
        </div>
        <h1 class="text-xl font-bold tracking-tight">CTDB Management Console</h1>
      </div>
      <div class="text-sm font-medium opacity-80">
        Role: Administrator
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto py-8 px-4">
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
      
      <!-- Sidebar / Controls -->
      <div class="lg:col-span-1 space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
          <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Authentication</h2>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1">Admin Password</label>
              <input 
                type="password" 
                id="pass" 
                placeholder="Enter password..." 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                oninput="document.body.setAttribute('hx-headers', JSON.stringify({'x-pass': this.value}))"
              >
            </div>
            <button 
              hx-get="/moderate/list" 
              hx-target="#data-container"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center space-x-2"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
              <span>Fetch Entries</span>
            </button>
          </div>
        </div>

        <div class="bg-indigo-50 p-6 rounded-xl border border-indigo-100">
          <h3 class="text-indigo-800 font-semibold text-sm mb-2">Access Notice</h3>
          <p class="text-indigo-600 text-xs leading-relaxed">
            Unauthorized access attempts are logged by IP. If you need legitimate access, please contact the project lead.
          </p>
        </div>
      </div>

      <!-- Main Content Area -->
      <div class="lg:col-span-3">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
          <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="font-bold text-gray-700">Database Entries</h2>
            <span class="text-xs text-gray-400">Showing last 50 keys</span>
          </div>
          
          <div id="data-container" class="divide-y divide-gray-100 min-h-[400px]">
            <!-- HTMX will inject the items here -->
            <div class="flex flex-col items-center justify-center h-full py-20 text-gray-400">
              <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
              <p>No data loaded. Enter password and click "Fetch Entries".</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</body>
</html>
